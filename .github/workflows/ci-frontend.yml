name: CI - frontend (app-src)

on:
  push:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  test:
    name: Jest coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app-src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: app-src/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run jest coverage
        run: |
          set -euo pipefail
          yarn test:coverage

  lint:
    name: ESLint + Stylelint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app-src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: app-src/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint --max-warnings 0

      - name: Run Stylelint
        run: yarn lint:css
