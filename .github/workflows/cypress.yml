# Workflow to run Cypress tests on multiple architectures and browsers
name: Cypress

env:
  WORKING_DIRECTORY: ./app-src
  NODE_VERSION: '22'

# Trigger the workflow on pull request or manual dispatch
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Install dependencies and update browserslist once per runner architecture,
  # then cache the result for all matrix browser jobs to share.
  prep:
    name: Install & update browserslist (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: app-src/yarn.lock

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-${{ runner.arch }}-cypress-binary-${{ hashFiles('**/app-src/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cypress-binary-

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: app-src/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-modules-${{ hashFiles('**/app-src/yarn.lock') }}

      - name: Update browserslist
        run: NPM_CONFIG_LEGACY_PEER_DEPS=true npx update-browserslist-db@latest

  # Run Cypress tests across all browsers; restore the cache written by prep.
  cypress-run:
    needs: prep
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
        browser: ['firefox', 'electron']
        include:
          - runner: ubuntu-24.04
            browser: chromium
          - runner: ubuntu-24.04
            browser: edge
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: app-src/yarn.lock

      - name: Restore Cypress binary cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-${{ runner.arch }}-cypress-binary-${{ hashFiles('**/app-src/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cypress-binary-

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: app-src/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-modules-${{ hashFiles('**/app-src/yarn.lock') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn --frozen-lockfile

      - name: Download assets
        run: node download-files.js

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}
          start: yarn run start:servers
          install: false
          command: yarn run cy:run --browser ${{ matrix.browser }}
          wait-on: 'http://localhost:3000, http://localhost:3001/health'

  # Gate job for Required Status Checks – always runs so branch protection
  # never stalls when cypress-run is skipped.
  cypress-tests-passed:
    needs: cypress-run
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Cypress results
        run: |
          if [[ "${{ needs.cypress-run.result }}" == "failure" ]]; then
            echo "Cypress tests failed" && exit 1
          fi
          echo "Cypress tests passed"
